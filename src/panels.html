<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Net JSON</title>
    <style>
        body {
            margin: 0;
            font: 12px/1.4 sans-serif;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            padding: 8px;
            border-bottom: 1px solid #ccc;
            align-items: center;
        }

        .toolbar input {
            flex: 1;
            min-width: 200px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            height: calc(100vh - 42px);
        }

        .list, .detail {
            overflow: auto;
        }

        .list {
            border-right: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid #eee;
            padding: 6px;
            vertical-align: top;
            text-align: left;
        }

        tr.item-row {
            cursor: pointer;
        }

        tr.item-row:hover {
            background: #f5f5f5;
        }

        .muted {
            color: #666;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }

        .empty {
            padding: 12px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="toolbar">
    <input id="filterInput" type="text" placeholder="URL contains... 例: api, graphql, v1/users" />
    <button id="clearBtn">Clear</button>
    <button id="exportBtn">Export JSON</button>
    <span id="count" class="muted">0 items</span>
</div>

<div class="layout">
    <div class="list">
        <table>
            <thead>
            <tr>
                <th>Method</th>
                <th>Status</th>
                <th>URL</th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>

    <div class="detail" id="detail">
        <div class="empty">左の項目をクリックすると、クエリパラメータを確認できます。</div>
    </div>
</div>

<script src="panel.js"></script>
</body>
</html>
